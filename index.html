<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>龍穎部落・遠征軍集結令｜座位查詢</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="stage" id="stage">
      <img class="bg" src="assets/background.png" alt="龍穎部落座位查詢背景" />

      <section class="map-layer" id="mapLayer" aria-label="戰略座位圖"></section>

      <section class="search-panel" aria-label="搜尋席位">
        <div class="panel-title">尋找你的席位</div>
        <input id="searchInput" class="search-input" type="search" placeholder="輸入姓名、扶輪社、桌名、推薦人" autocomplete="off" />
        <div class="search-actions">
          <button id="searchBtn" class="primary-btn">搜尋</button>
          <button id="clearBtn" class="ghost-btn">清除</button>
        </div>
        <div class="hint">可輸入：大D、龍穎、酋長議會、第 8 桌。</div>
      </section>

      <section class="info-panel" id="infoPanel" aria-live="polite"></section>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
